name: Feature request
description: Suggest a product, story, UX, or technical improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Story system
        - World state / quest tracking
        - AI configuration
        - Save system
        - Deployment
        - Docs / project workflow
        - UI / UX
        - Other
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User impact
